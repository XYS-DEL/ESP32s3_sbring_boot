# ==========================================
# Spring Boot Web 服务配置
# ==========================================
server:
  port: 8080

# ==========================================
# 核心 Spring 配置 (包含数据库和时序引擎)
# ==========================================
spring:
  application:
    name: esp32-iot-backend

  # MySQL 关系型数据库配置
  datasource:
    username: root
    password: 12345678
    url: jdbc:mysql://localhost:3306/esp32_iot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
  # InfluxDB 时序数据库配置
  influx:
    url: http://localhost:8086
    token: "8SZrdXwX4H_1TtPnlgw-dfZ7nRiiT_HXiX_2KrOD3dkyKuYnP9TI1exiTTy8fo1epPY-nULwBLKo9meTFm1bJQ=="
    org: iot_org
    bucket: esp32_telemetry

# ==========================================
# 自定义 MQTT 核心参数映射
# ==========================================
mqtt:
  url: tcp://broker.emqx.io:1883
  client-id: springboot-iot-center-888
  topic:
    state-sub: device/esp32s3/+/state
    command-pub-prefix: device/esp32s3/
  completion-timeout: 3000
  keep-alive: 15

# ==========================================
# MyBatis-Plus 配置
# ==========================================
mybatis-plus:
  global-config:
    db-config:
      map-underscore-to-camel-case: true
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl